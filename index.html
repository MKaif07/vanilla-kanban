<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Board</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playwrite+GB+J:ital,wght@0,100..400;1,100..400&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="container">
        <header class="header">
            <h1 class="kanban-title">Kanban Board</h1>
        </header>
        <div class="modal-backdrop hidden" id="modal-backdrop">
            <div class="item-modal">
                <h2>Edit Task</h2>
                <textarea id="modal-task-text"></textarea>
                <div class="modal-actions">
                    <button id="save-task">Save</button>
                    <button id="cancel-task">Cancel</button>
                </div>
            </div>
        </div>

        <div class="board">
            <div class="board-col" id="todo">
                <h2 class="title-col title-todo">To-do's</h2>
                <input type="text" class="board-input" id="todo-todo">
                <div class="item-list" id="todo-list" data-status="todo">
                </div>
            </div>
            <div class="board-col" id="progress">
                <h2 class="title-col title-progress">In Progress</h2>
                <input type="text" class="board-input" id="todo-progress">
                <div class="item-list" id="progress-list" data-status="progress">
                </div>
            </div>
            <div class="board-col" id="done">
                <h2 class="title-col title-done">Done</h2>
                <input type="text" class="board-input" id="todo-done">
                <div class="item-list" id="done-list" data-status="done">
                </div>
            </div>
        </div>
    </div>
    <footer>
        Made by Kaif
    </footer>
</body>

</html>
